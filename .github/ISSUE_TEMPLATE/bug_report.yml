name: Bug report
description: Report something broken in DARKSOL Terminal
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include private keys, seed phrases, API keys, passwords, or session tokens.
        For active vulnerabilities, report privately using SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version
      description: Run `darksol --version` or check `npm view @darksol/terminal version`.
      placeholder: "0.19.2"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "Windows 11, macOS, Linux, Node 20"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or workflow
      description: Include the command and sanitized output.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
