name: Feature request
description: Suggest an upgrade or new workflow
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator, wallet, trading, or agent workflow should improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should DARKSOL Terminal add or change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Wallet/security
        - Trading/bridging
        - Agent harness
        - Mission Control/web terminal
        - Wiretap/AIM
        - Documentation
        - Other
    validations:
      required: true
